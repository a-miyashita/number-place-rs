name: Release

on:
  push:
    tags: [ "v[0-9]+.[0-9]+.[0-9]+" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Verify version matches tag
      run: |
        TAG="${GITHUB_REF_NAME}"
        CARGO_VERSION="v$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')"
        echo "Tag: $TAG"
        echo "Cargo.toml version: $CARGO_VERSION"
        if [ "$TAG" != "$CARGO_VERSION" ]; then
          echo "Error: tag ($TAG) does not match Cargo.toml version ($CARGO_VERSION)"
          exit 1
        fi

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "$GITHUB_REF_NAME" \
          --title "$GITHUB_REF_NAME" \
          --generate-notes

    - name: Publish to crates.io (Trusted Publishing)
      run: |
        OIDC_TOKEN=$(curl -fsSL \
          -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=crates.io" \
          | jq -r '.value')
        CRATES_IO_TOKEN=$(curl -fsSL \
          -X POST https://crates.io/api/v1/trusted_publishing/tokens \
          -H "Content-Type: application/json" \
          -d "{\"oidc_token\": \"$OIDC_TOKEN\"}" \
          | jq -r '.token')
        cargo publish --token "$CRATES_IO_TOKEN"
